version: 1
backend:
  phases:
    build:
      commands:
        # Use `npm install` instead of `npm ci`.
        # `npm ci` fails here because Amplify's bundled deps
        # (@opentelemetry/core, uuid) aren't recorded in package-lock.json.
        - npm install --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
